# See docs at: https://mystmd.org/guide/frontmatter
version: 1
extends:
  - https://raw.githubusercontent.com/projectpythia/pythia-config/main/pythia.yml
project:
  id: 00033604-f595-498a-9407-eab331b49411
  title: Web Map / Feature Services Cookbook
  
  error_rules:
    - rule: link-resolves
      severity: ignore
      keys:
        - 'https://doi.org/**'
        - 'https://zenodo.org/**'
        - 'https://www.earthdata.nasa.gov/' # says Forbidden but directs just fine
    - rule: doi-link-valid
      severity: ignore
      keys:
        - 'https://zenodo.org/**'   # also suppress the DOI validation error
  # description:
  #   # keywords: []
  #     # authors: []
  # description:
  # keywords: []
  # authors: []
  github: https://github.com/ProjectPythia/web-map-feature-services-cookbook
  # To autogenerate a Table of Contents, run "myst init --write-toc"
  toc:
    # Auto-generated by `myst init --write-toc`
    - file: README.md
    - title: Foundations
      children:
        - file: notebooks/introduction.ipynb
        - file: notebooks/web_map_services.ipynb
        - file: notebooks/web_feature_services.ipynb
    - title: Example Workflows
      children:
        - file: notebooks/nasa_earthdata_gibs_explorer.ipynb
    
site:
  template: book-theme
  options:
    logo: notebooks/images/logos/pythia_logo-white-rtext.svg
    folders: true
